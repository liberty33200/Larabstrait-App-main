version: '3.8'

services:
  larabstrait:
    build: .
    container_name: larabstrait-app
    restart: unless-stopped
    ports:
      - "3050:3000"
    environment:
      - NODE_ENV=production
      # On fait le pont pour Microsoft
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      # On fait le pont pour l'URL de l'app et les notifications
      - REDIRECT_URI=${REDIRECT_URI}
      - REDIRECT_URL=${REDIRECT_URL}
      - APP_URL=${APP_URL}
      - DATAVERSE_URL=${DATAVERSE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - ABBY_API_KEY=${ABBY_API_KEY}
      - abby_api_key=${abby_api_key}
      # Ajoute ici d'autres variables si tu en as dans ton .env (Abby, etc.)
    volumes:
      - larabstrait_data:/app/data

volumes:
  larabstrait_data: