version: '3.8'

services:
  # --- DASHBOARD (App principale) ---
  larabstrait:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: larabstrait-app
    restart: unless-stopped
    ports:
      - "3050:3000"
    environment:
      - NODE_ENV=production
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - EMAIL_STUDIO=${EMAIL_STUDIO}
      - REDIRECT_URI=${REDIRECT_URI}
      - REDIRECT_URL=${REDIRECT_URL}
      - APP_URL=${APP_URL}
      - DATAVERSE_URL=${DATAVERSE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - ABBY_API_KEY=${ABBY_API_KEY}
      - abby_api_key=${abby_api_key}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    volumes:
      # Chemins absolus obligatoires pour Synology
      - /volume1/docker/larabstrait-app/data:/app/data
      - /volume1/docker/larabstrait-app/uploads:/app/data/uploads

  # --- FORMULAIRE (Booking) ---
  larabstrait-booking:
    build:
      context: ./book-larabstrait
      dockerfile: Dockerfile
    container_name: larabstrait-booking
    restart: unless-stopped
    ports:
      - "3051:5173" # On mappe le 3051 du NAS vers le 5173 du container
    environment:
      - NODE_ENV=production
      - APP_URL=https://booking.larabstrait.fr
